  labels:
    inference.networking.k8s.io/engine-type: vllm
    llm-d.ai/accelerator-variant: gpu
    llm-d.ai/accelerator-vendor: nvidia
    llm-d.ai/guide: pd-disaggregation
    llm-d.ai/model: gpt-oss-120b
    llm-d.ai/role: decode
  name: pd-disaggregation-nvidia-gpu-vllm-decode-slow
  namespace: dpikus-pd-sglang-bench
spec:
  progressDeadlineSeconds: 600
  replicas: 2
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      inference.networking.k8s.io/engine-type: vllm
      llm-d.ai/accelerator-variant: gpu
      llm-d.ai/accelerator-vendor: nvidia
      llm-d.ai/guide: pd-disaggregation
      llm-d.ai/model: gpt-oss-120b
      llm-d.ai/role: decode
      llm-d.ai/variant: slow
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        inference.networking.k8s.io/engine-type: vllm
        llm-d.ai/accelerator-variant: gpu
        llm-d.ai/accelerator-vendor: nvidia
        llm-d.ai/guide: pd-disaggregation
        llm-d.ai/model: gpt-oss-120b
        llm-d.ai/role: decode
        llm-d.ai/variant: slow
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  llm-d.ai/guide: pd-disaggregation
                  llm-d.ai/role: prefill
              topologyKey: kubernetes.io/hostname
      containers:
        - args:
            - Qwen/Qwen3-VL-32B-Instruct
            - --disable-access-log-for-endpoints=/health,/metrics,/v1/models
            - --tensor-parallel-size=2
            - --block-size=128
            - --kv-transfer-config
            - '{"kv_connector":"NixlConnector", "kv_role":"kv_both"}'
            - --no-disable-hybrid-kv-cache-manager
            - --port=8200
            - --load-format=runai_streamer
            - --max-num-seqs=4
            - --max-num-batched-tokens=4096
          command:
            - vllm
            - serve
          env:
            - name: HF_HUB_OFFLINE
              value: "1"
            - name: TRANSFORMERS_OFFLINE
              value: "1"
            - name: HF_HOME
              value: /model-cache
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  key: HF_TOKEN
                  name: llm-d-hf-token
                  optional: true
            - name: RUNAI_STREAMER_MEMORY_LIMIT
              value: "17179869184"
            - name: VLLM_NIXL_SIDE_CHANNEL_HOST
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.podIP
          image: ghcr.io/revit13/vllm-openai:nightly-b50646e5effd7cb5884cd96fdff4c53c18521198.omer4
          imagePullPolicy: IfNotPresent
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /health
              port: modelserver
              scheme: HTTP
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          name: modelserver
          ports:
            - containerPort: 8200
              name: modelserver
              protocol: TCP
            - containerPort: 5600
              name: nixl
              protocol: TCP
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /v1/models
              port: modelserver
              scheme: HTTP
            periodSeconds: 5
            successThreshold: 1
            timeoutSeconds: 2
          resources:
            limits:
              cpu: "16"
              memory: 256Gi
              nvidia.com/gpu: "2"
              rdma/ib: "1"
            requests:
              cpu: "16"
              memory: 256Gi
              nvidia.com/gpu: "2"
              rdma/ib: "1"
          startupProbe:
            failureThreshold: 120
            httpGet:
              path: /v1/models
              port: modelserver
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 5
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          volumeMounts:
            - mountPath: /model-cache
              name: model-cache
            - mountPath: /dev/shm
              name: shm
            - mountPath: /.cache
              name: torch-compile-cache
            - mountPath: /.config
              name: vllm-config
            - mountPath: /.triton
              name: triton-cache
      dnsPolicy: ClusterFirst
      initContainers:
        - args:
            - --port=8000
            - --vllm-port=8200
            - --connector=nixlv2
            - --zap-log-level=1
            - --secure-proxy=false
          image: ghcr.io/llm-d/llm-d-routing-sidecar:v0.8.0
          imagePullPolicy: Always
          name: routing-proxy
          ports:
            - containerPort: 8000
              name: sidecar
              protocol: TCP
          resources: {}
          restartPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      serviceAccount: pd-disaggregation-nvidia-gpu-vllm-sa
      serviceAccountName: pd-disaggregation-nvidia-gpu-vllm-sa
      terminationGracePeriodSeconds: 30
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: llm-d-model-cache
        - emptyDir:
            medium: Memory
            sizeLimit: 20Gi
          name: shm
        - emptyDir: {}
          name: torch-compile-cache
        - emptyDir: {}
          name: vllm-config
        - emptyDir: {}
          name: triton-cache
