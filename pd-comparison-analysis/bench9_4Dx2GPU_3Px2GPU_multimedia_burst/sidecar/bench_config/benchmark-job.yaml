---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sglang-bench-script
data:
  run_bench.sh: |
    #!/bin/bash
    set -euo pipefail
    MODEL="Qwen/Qwen3-VL-32B-Instruct"
    BURST_RATE=1000            # ≈ instantaneous burst
    BURST_SIZES=(4 8 16 32 64 128)
    IMAGE_COUNT=3
    IMAGE_RESOLUTION=1080p
    RANDOM_INPUT_LEN=300
    RANDOM_OUTPUT_LEN=2000
    HOST="${GATEWAY_IP}"
    PORT="80"

    for burst_size in "${BURST_SIZES[@]}"; do
      echo "[$(date)] === burst_size ${burst_size} ==="
      python -m sglang.bench_serving \
        --model "${MODEL}" \
        --num-prompts "${burst_size}" \
        --dataset-name image \
        --random-input-len ${RANDOM_INPUT_LEN} \
        --random-output-len ${RANDOM_OUTPUT_LEN} \
        --image-count ${IMAGE_COUNT} \
        --image-resolution ${IMAGE_RESOLUTION} \
        --host "${HOST}" \
        --port "${PORT}" \
        --backend sglang-oai-chat \
        --request-rate "${BURST_RATE}" \
        --ready-check-timeout-sec 0 \
        --random-range-ratio 1.0 \
        --extra-request-body '{"ignore_eos": true}'
      sleep 60   # extra quiesce between bursts if metrics scraping needs it
      echo "[$(date)] burst_size ${burst_size} done."
    done
    echo "[$(date)] All rates complete."

---
apiVersion: batch/v1
kind: Job
metadata:
  name: sglang-bench
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node.kubernetes.io/instance-type
                operator: In
                values:
                - turin-gp
      containers:
        - name: bench
          image: docker.io/lmsysorg/sglang:v0.5.14
          command: ["/bin/bash", "/scripts/run_bench.sh"]
          env:
            - name: GATEWAY_IP
              value: "llm-d-inference-gateway-istio"
          resources:
            requests:
              cpu: "4"
              memory: "8Gi"
            limits:
              cpu: "8"
              memory: "16Gi"
          volumeMounts:
            - name: script
              mountPath: /scripts
      volumes:
        - name: script
          configMap:
            name: sglang-bench-script
            defaultMode: 0755
