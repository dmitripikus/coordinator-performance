apiVersion: v1
kind: Pod
metadata:
  name: iperf3-server
  namespace: dpikus-epd-sglang-bench
  labels:
    app: iperf3
    role: server
spec:
  nodeName: g11bab6
  tolerations:
  - key: is_gpu
    operator: Equal
    value: "true"
    effect: PreferNoSchedule
  restartPolicy: Never
  containers:
  - name: iperf3
    image: nicolaka/netshoot:latest
    command: ["iperf3", "-s", "-p", "5201"]
    ports:
    - containerPort: 5201
      name: iperf3
      protocol: TCP
    - containerPort: 5201
      name: iperf3-udp
      protocol: UDP
    resources:
      requests:
        cpu: "500m"
        memory: "256Mi"
      limits:
        cpu: "2"
        memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: iperf3-server
  namespace: dpikus-epd-sglang-bench
spec:
  selector:
    app: iperf3
    role: server
  ports:
  - name: iperf3
    port: 5201
    targetPort: 5201
    protocol: TCP
  - name: iperf3-udp
    port: 5201
    targetPort: 5201
    protocol: UDP
