endpoint:
  stack_name: &stack_name epd-gpt-qwen3-VL   # user defined name for the stack (results prefix)
  model: &model Qwen/Qwen3-VL-235B-A22B-Instruct         # Exact HuggingFace model name. Must match stack deployed.
  namespace: &namespace dpikus-epd-sglang-bench        # Namespace where stack is deployed
  base_url: &url http://10.16.2.63:80   # Base URL of inference endpoint
  hf_token_secret: llm-d-hf-token           # The name of secret that contains the HF token of the stack

control:
  work_dir: /Users/dpikus/llm-d-bench-work  # working directory to store temporary and autogenerated files.
                                    # Do not edit content manually.
                                    # If not set, a temp directory will be created.
  kubectl: kubectl                  # kubectl command: kubectl or oc

harness:
  name: &harness_name inference-perf
  results_pvc: workload-pvc   # PVC where benchmark results are stored
  namespace: *namespace           # Namespace where harness is deployed. Typically with stack.
  parallelism: 1                  # Number of parallel workload launcher pods to create.
  wait_timeout: 6000              # Time (in seconds) to wait for workload launcher pod to complete before terminating.
                                  # Set to 0 to disable timeout.
  image: ghcr.io/llm-d/llm-d-benchmark:v0.5.2
  # dataset_url: &dataset_url none

env:
  - name: RAYON_NUM_THREADS
    value: "4"

# Warmup workload — priming, not stress.
# Rationale (see bench7 investigation): the 235B backend delivers ~1250 tok/s per decode pod.
# With OSL=4000 and 400 concurrent, per-request throughput drops to ~9.5 tok/s → 7 min/request,
# which exceeds the harness aiohttp streaming timeout (~5 min) → 100% client-side timeouts.
# This warmup uses low concurrency and short OSL so every request completes end-to-end,
# exercising prefill + NIXL KV transfer + decode across all replicas.
workload:
  random_warmup:
    load:
      type: constant
      stages:
      - rate: 1.
        duration: 120
        num_requests: null
        concurrency_level: null
      num_workers: 4
      worker_max_concurrency: 4
    api:
      type: completion
      streaming: true
    server:
      type: vllm
      model_name: *model
      base_url: *url
      ignore_eos: true
    tokenizer:
      pretrained_model_name_or_path: *model
    data:
      type: random
      input_distribution:
        min: 250
        max: 250
        mean: 250
        std_dev: 0
      output_distribution:
        min: 256
        max: 256
        mean: 256
        std_dev: 0
    report:
      request_lifecycle:
        summary: true
    storage:
      local_storage:
        path: /workspace
