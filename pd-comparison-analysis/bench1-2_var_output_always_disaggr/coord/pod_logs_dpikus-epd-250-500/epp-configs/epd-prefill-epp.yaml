apiVersion: v1
data:
  default-plugins.yaml: |
    apiVersion: llm-d.ai/v1alpha1
    kind: EndpointPickerConfig
    plugins:
    - type: queue-scorer
    - type: kv-cache-utilization-scorer
    - type: prefix-cache-scorer
    - type: metrics-data-source
      parameters:
        scheme: "http"
        path: "/metrics"
        insecureSkipVerify: true
    - type: core-metrics-extractor
    schedulingProfiles:
    - name: default
      plugins:
      - pluginRef: queue-scorer
        weight: 2
      - pluginRef: kv-cache-utilization-scorer
        weight: 2
      - pluginRef: prefix-cache-scorer
        weight: 3
  epd-plugins.yaml: "apiVersion: llm-d.ai/v1alpha1\nkind: EndpointPickerConfig\nplugins:\n-
    type: vllmhttp-parser\n- type: openai-parser    \n- type: queue-scorer\n- type:
    kv-cache-utilization-scorer\n- type: prefix-cache-scorer\nschedulingProfiles:\n-
    name: default\n  plugins:\n  - pluginRef: queue-scorer\n    weight: 2\n  - pluginRef:
    kv-cache-utilization-scorer\n    weight: 2\n  - pluginRef: prefix-cache-scorer\n
    \   weight: 3\nrequestHandler:\n  parsers:\n    - pluginRef: vllmhttp-parser\n
    \   - pluginRef: openai-parser\n"
  payload-agnostic.yaml: |
    # Request-format agnostic routing. Use this when the request format is
    # unknown or unsupported, so the EPP cannot rely on scorers that read the
    # request body (e.g. the prefix-cache scorer). The passthrough parser does
    # not parse the body, and routing falls back to backend-state scorers:
    #   - active-request-scorer  : prefers the least busy endpoint
    #   - session-affinity-scorer: keeps a session pinned to the same endpoint
    # Select it by setting router.epp.pluginsConfigFile: payload-agnostic.yaml
    apiVersion: llm-d.ai/v1alpha1
    kind: EndpointPickerConfig
    plugins:
    - type: passthrough-parser
    - type: active-request-scorer
    - type: session-affinity-scorer
    requestHandler:
      parsers:
      - pluginRef: passthrough-parser
    schedulingProfiles:
    - name: default
      plugins:
      - pluginRef: active-request-scorer
        weight: 1
      - pluginRef: session-affinity-scorer
        weight: 1
